name: Build 07

on:
  workflow_dispatch:

jobs:
  build-07-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: 07_model_textured

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.275.0
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 07_model_textured/go.mod
          cache-dependency-path: 07_model_textured/go.sum

      - name: Build macOS binary
        run: make build-macos
        env:
          CGO_LDFLAGS: "-L${{ env.VULKAN_SDK }}/lib"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 07_model_textured-macos
          path: 07_model_textured/07_model_textured_macos
          retention-days: 7
